services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: qazaq_learn
      POSTGRES_USER: qazaq_user
      POSTGRES_PASSWORD: qazaq_password
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qazaq_learn
      SPRING_DATASOURCE_USERNAME: qazaq_user
      SPRING_DATASOURCE_PASSWORD: qazaq_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: change-me-in-production
      JWT_EXPIRATION_MS: 86400000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-char-key}
      SERVER_PORT: 8080
    ports:
      - 8080:8080
    depends_on:
      - postgres
      - redis
      - kafka

  frontend:
    build:
      context: ./qazaq-learn-frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
    depends_on:
      - app

volumes:
  postgres-data:
